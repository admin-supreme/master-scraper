name = "master-scraper"
main = "src/server.ts"
compatibility_date = "2026-03-23"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
DEPLOYMENT_ENV = "cloudflare-workers"
CORS_ALLOWED_ORIGINS = "*"
RATE_LIMIT_WINDOW_MS = "60000"
RATE_LIMIT_MAX_REQUESTS = "100"
CACHE_TTL_SECONDS = "300"